name: Keep Render Backend Awake

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (it sleeps after 15 mins of inactivity)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: curl -sSf https://magp-togaf.onrender.com/health || exit 1
